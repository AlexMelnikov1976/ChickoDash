name = "chicko-api-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-22"

[vars]
ENVIRONMENT = "production"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[[kv_namespaces]]
binding = "USERS"
id = "6f095f10194a45ec9cdcc98129fb2426"

[[kv_namespaces]]
binding = "MAGIC_LINKS"
id = "5519cb41b5554c51bf248dbecee1aa6a"

# Workers Static Assets (Phase 2.8, 2026-04-22)
# Даёт нам возможность отдавать public/dashboard.{html,css,js} с CDN Cloudflare.
# run_worker_first=true — все запросы идут через Worker, он сам решает отдать
# статику через env.ASSETS.fetch() или обработать в коде. Без этого флага
# /dashboard.html отдавался бы напрямую БЕЗ security headers.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
